<mat-card class="book-card">
    <mat-card-title>{{ book.titre }}</mat-card-title>
    <mat-card-content>
        <p>Auteur: {{ book.auteur }}</p>
        <p>Categorie: {{ book.categorie }}</p>
        <p>Annee: {{ book.annee }}</p>
        <p>Status: {{ book.disponible ? 'Disponible' : 'Emprunté'}}</p>
    </mat-card-content>
    <button mat-icon-button color="warn" (click)="onDelete()">
        <mat-icon>delete</mat-icon>
    </button>
</mat-card>
