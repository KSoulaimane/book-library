<form [formGroup]="bookForm" (ngSubmit)="submitForm()">

  <mat-form-field appearance="fill">
    <mat-label>Titre</mat-label>
    <input matInput formControlName="titre">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Auteur</mat-label>
    <input matInput formControlName="auteur">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Catégorie</mat-label>
    <input matInput formControlName="categorie">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Année</mat-label>
    <input matInput type="number" formControlName="annee">
  </mat-form-field>

  <mat-checkbox formControlName="disponible">
    Disponible
  </mat-checkbox>

  <button mat-raised-button color="primary" type="submit" [disabled]="bookForm.invalid">
    {{ bookToEdit ? 'Modifier' : 'Ajouter' }}
  </button>
</form>
