<mat-checkbox [(ngModel)]="afficherDisponibles">
    Afficher seulement les livres disponibles
</mat-checkbox>
<mat-toolbar color="primary">
    <mat-toolbar-row>
      <span>Ma Bibliothèque - Nombre total de livres : {{ booksCount$ | async }}</span>
      <span class="spacer"></span>
      <button mat-raised-button color="accent" (click)="ouvrirForm()">Ajouter livre</button>
    </mat-toolbar-row>
  </mat-toolbar>
  
<div class="book-list">
  <p *ngIf="(books$ | async)?.length === 0">Aucun livre dans la bibliothèque</p>

  <ng-container *ngFor="let book of (afficherDisponibles ? availableBooks$ : books$) | async">
    <app-book-item
      [book]="book"
      (deleteBook)="onDeleteBook($event)"
      (editBook)="ouvrirFormModification($event)">
    </app-book-item>
  </ng-container> 
</div>
